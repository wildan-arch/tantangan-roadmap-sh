  <body>
    <!-- Navigasi wajib ada di setiap halaman -->

      <h1>Wildan Pamungkas</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>

          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>Mari berkenalan</h2>

        <!-- Form Kontak -->
        <form action="#" method="POST">
          <p>
            <label for="name">Nama:</label><br />
            <input type="text" id="name" name="name" placeholder="Nama lengkap Anda" required />
          </p>

          <p>
            <label for="email">Email:</label><br />
            <input type="email" id="email" name="email" placeholder="contoh@gmail.com" required />
          </p>

          <p>
            <label for="message">Pesan:</label><br />
            <!-- Menggunakan textarea untuk pesan yang panjang -->
            <textarea id="message" name="message" rows="5" placeholder="Tulis pesan Anda di sini..." required></textarea>
          </p>
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; all rights reserved 2026</p>
